<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoe Card</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Muli"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="root">
      <div class="product">
        <div class="left">
            <img src="images/shoe.png" alt="" class="shoe">
        </div>
        <div class="right">
          <span class="logo">Airmax</span>
          <div class="content">
            <div class="title">
              <span class="winter">Winter Collection</span><br />
              <span class="men">Men Black Sneakers</span>
            </div>
            <div class="price">
              <span class="price1">150</span><span class="price2">200</span>
            </div>
            <div class="size">
              <span class="s">SIZE</span>
              <div class="sizeN">
                <span>7</span><span>8</span><span>9</span><span>10</span
                ><span>11</span>
              </div>
            </div>
            <div class="color">
              <span class="s">COLOR</span>
              <div class="colorbox">
                <div class="yellow"></div>
                <div class="black"></div>
                <div class="blue"></div>
              </div>
            </div>
            <div class="footer">
                <span>Buy Now</span><span>Add to Cart</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
